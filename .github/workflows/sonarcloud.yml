name: SonarCloud Analysis
permissions: {}
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Collapse superseded runs on the same ref. Rapid automated pushes to a PR branch
# would otherwise each spawn a SonarCloud run; the older ones get held pending
# approval (action_required) and inflate the Fleet Monitor failure rate (#263).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      # First attempt. continue-on-error lets the retry step below recover from
      # transient 403/5xx responses from binaries.sonarsource.com (the scanner
      # CLI download), without failing the job on a single CDN blip (#272).
      - name: SonarCloud Scan
        id: sonar
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        continue-on-error: true
      - name: SonarCloud Scan (retry)
        if: ${{ env.SONAR_TOKEN != '' && steps.sonar.outcome == 'failure' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
