# SonarCloud Analysis
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md#3-sonarcloud-analysis-sonarcloudyml
name: SonarCloud Analysis
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Collapse superseded runs on the same ref. Rapid automated pushes to a PR branch
# would otherwise each spawn a SonarCloud run; the older ones get held pending
# approval (action_required) and inflate the Fleet Monitor failure rate (#263).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Backstop the whole job. A normal scan finishes in well under a minute, so a job
    # running this long means something is wedged (e.g. a stalled checkout). Without a
    # bound the default is 6 hours, which the Fleet Monitor records as a timed_out
    # failure (fleet_monitor.sh). Set above the two 5-minute scan-step budgets so the
    # per-step timeouts normally win and this stays a true backstop; under the org cap
    # of 59 (ci-standards.md).
    timeout-minutes: 12
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      # First attempt. continue-on-error lets the retry step below recover from
      # transient 403/5xx responses from binaries.sonarsource.com (the scanner
      # CLI download), without failing the job on a single CDN blip (#272).
      - name: SonarCloud Scan
        id: sonar
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        continue-on-error: true
        # Bound the first attempt so a hung CDN download or analysis upload fails fast
        # (continue-on-error keeps the job alive) and the retry below can recover —
        # rather than the hang blocking the job until the timeout-minutes backstop.
        timeout-minutes: 5
      - name: SonarCloud Scan (retry)
        if: ${{ env.SONAR_TOKEN != '' && steps.sonar.outcome == 'failure' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        timeout-minutes: 5
