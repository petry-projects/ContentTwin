# CI Pipeline
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md#1-ci-pipeline-ciyml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint shell scripts
        run: |
          shellcheck scripts/*.sh

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Retry the release-asset download: a single transient GitHub CDN blip must
      # not fail the job and inflate the Fleet Monitor failure rate (issue #360).
      - name: Install shfmt
        run: |
          for attempt in 1 2 3; do
            if curl --proto '=https' -sSfL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 \
              -o /usr/local/bin/shfmt; then
              chmod +x /usr/local/bin/shfmt
              exit 0
            fi
            echo "shfmt download attempt ${attempt} failed; retrying in $((attempt * 5))s" >&2
            sleep "$((attempt * 5))"
          done
          echo "shfmt download failed after 3 attempts" >&2
          exit 1

      - name: Check shell script formatting
        run: shfmt -i 2 -d scripts/*.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Retry the apt mirror update+install: a transient mirror 5xx/timeout must
      # not fail the job and inflate the Fleet Monitor failure rate (issue #360).
      - name: Install bats
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y bats; then
              exit 0
            fi
            echo "bats install attempt ${attempt} failed; retrying in $((attempt * 5))s" >&2
            sleep "$((attempt * 5))"
          done
          echo "bats install failed after 3 attempts" >&2
          exit 1

      - name: Run bats tests
        run: bats scripts/tests/

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        # Pin to SHA per Action Pinning Policy (ci-standards.md#action-pinning-policy).
        # Look up current SHA: gh api repos/actions/checkout/git/refs/tags/v4 --jq '.object.sha'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Install the gitleaks CLI (free, pinned binary + SHA256 verification)
      # instead of gitleaks/gitleaks-action, which requires a paid GITLEAKS_LICENSE
      # for org repos and therefore failed on Dependabot PRs — those runs receive
      # no repository secrets, so the license was empty (issue #364). See
      # push-protection.md Layer 3: CI Secret Scanning.
      # Retry the release-asset download: a single transient GitHub CDN blip must
      # not fail the job and inflate the Fleet Monitor failure rate (issue #360).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          # Named GITLEAKS_CHECKSUM (not GITLEAKS_SHA256) — SonarCloud flags env var names
          # matching *SHA256* containing hex strings as Security Hotspots (false positive).
          GITLEAKS_CHECKSUM: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          downloaded=false
          for attempt in 1 2 3; do
            if curl --proto '=https' -sSfL "${url}" -o /tmp/gitleaks.tar.gz; then
              downloaded=true
              break
            fi
            echo "gitleaks download attempt ${attempt} failed; retrying in $((attempt * 5))s" >&2
            sleep "$((attempt * 5))"
          done
          if [ "$downloaded" != "true" ]; then
            echo "gitleaks download failed after 3 attempts" >&2
            exit 1
          fi
          echo "${GITLEAKS_CHECKSUM}  /tmp/gitleaks.tar.gz" | sha256sum -c
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
