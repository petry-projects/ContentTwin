# CI Pipeline
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md#1-ci-pipeline-ciyml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint shell scripts
        run: |
          shellcheck scripts/*.sh

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Retry the release-asset download: a single transient GitHub CDN blip must
      # not fail the job and inflate the Fleet Monitor failure rate (issue #360).
      - name: Install shfmt
        run: |
          for attempt in 1 2 3; do
            if curl -sSfL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 \
              -o /usr/local/bin/shfmt; then
              chmod +x /usr/local/bin/shfmt
              exit 0
            fi
            echo "shfmt download attempt ${attempt} failed; retrying in $((attempt * 5))s" >&2
            sleep "$((attempt * 5))"
          done
          echo "shfmt download failed after 3 attempts" >&2
          exit 1

      - name: Check shell script formatting
        run: shfmt -i 2 -d scripts/*.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Retry the apt mirror update+install: a transient mirror 5xx/timeout must
      # not fail the job and inflate the Fleet Monitor failure rate (issue #360).
      - name: Install bats
        run: |
          for attempt in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y bats; then
              exit 0
            fi
            echo "bats install attempt ${attempt} failed; retrying in $((attempt * 5))s" >&2
            sleep "$((attempt * 5))"
          done
          echo "bats install failed after 3 attempts" >&2
          exit 1

      - name: Run bats tests
        run: bats scripts/tests/

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        # Pin to SHA per Action Pinning Policy (ci-standards.md#action-pinning-policy).
        # Look up current SHA: gh api repos/actions/checkout/git/refs/tags/v4 --jq '.object.sha'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        # Pinned to SHA per Action Pinning Policy (ci-standards.md#action-pinning-policy).
        # Refresh with: gh api repos/gitleaks/gitleaks-action/git/refs/tags/v2 --jq '.object.sha'
        # then dereference if it points at an annotated tag.
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        with:
          args: detect --source . --redact --verbose --exit-code 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
