# CI Pipeline
# Standard: https://github.com/petry-projects/.github/blob/main/standards/ci-standards.md#1-ci-pipeline-ciyml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

  format:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shfmt
        run: |
          curl -sSfL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Check shell script formatting
        run: shfmt -i 2 -d scripts/*.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        # Pin to SHA per Action Pinning Policy (ci-standards.md#action-pinning-policy).
        # Look up current SHA: gh api repos/actions/checkout/git/refs/tags/v6 --jq '.object.sha'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks v8.30.1
        # gitleaks-action v2+ requires a commercial license; use the CLI binary directly.
        # Pin by version tag — the Action Pinning Policy covers `uses:` steps only.
        # gh release download fetches via the authenticated GitHub API and we verify
        # SHA256 against the official checksums.txt before extracting.
        run: |
          mkdir -p /tmp/gitleaks-install
          gh release download v8.30.1 \
            --repo gitleaks/gitleaks \
            --pattern 'gitleaks_8.30.1_linux_x64.tar.gz' \
            --pattern 'gitleaks_8.30.1_checksums.txt' \
            --dir /tmp/gitleaks-install
          cd /tmp/gitleaks-install
          sha256sum --check --ignore-missing gitleaks_8.30.1_checksums.txt
          tar -xz -f gitleaks_8.30.1_linux_x64.tar.gz -C /usr/local/bin gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run gitleaks (full history)
        run: gitleaks git --redact --verbose --exit-code 1
