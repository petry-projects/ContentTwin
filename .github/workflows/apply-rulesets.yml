name: Apply Repository Rulesets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  code-quality-ruleset:
    name: Apply code-quality ruleset
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Apply code-quality ruleset
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING_ID=$(gh api "repos/$REPO/rulesets" \
            --jq '.[] | select(.name == "code-quality") | .id' 2>/dev/null || true)

          PAYLOAD=$(cat <<'JSON'
          {
            "name": "code-quality",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["~DEFAULT_BRANCH"],
                "exclude": []
              }
            },
            "rules": [
              {
                "type": "required_status_checks",
                "parameters": {
                  "required_status_checks": [
                    { "context": "SonarCloud" }
                  ],
                  "strict_required_status_checks_policy": false,
                  "do_not_enforce_on_create": false
                }
              }
            ]
          }
          JSON
          )

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing 'code-quality' ruleset (id: $EXISTING_ID)..."
            echo "$PAYLOAD" | gh api "repos/$REPO/rulesets/$EXISTING_ID" -X PUT --input -
          else
            echo "Creating 'code-quality' ruleset..."
            echo "$PAYLOAD" | gh api "repos/$REPO/rulesets" -X POST --input -
          fi
          echo "Done."
