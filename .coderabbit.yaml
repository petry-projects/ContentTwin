# CodeRabbit configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit
language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!_bmad/**"
    - "!_bmad-output/**"
    - "!.claude/**"
  path_instructions:
    - path: "**/*.py"
      instructions: >
        Focus on Python best practices, type hints, error handling,
        and security considerations. Flag any potential issues with
        subprocess calls or shell command injection.
    - path: "**/*.ts"
      instructions: >
        Focus on TypeScript best practices, proper typing, error handling,
        and security considerations. Flag any potential XSS or injection issues.
    - path: "**/*.js"
      instructions: >
        Focus on JavaScript best practices, error handling,
        and security considerations. Flag any potential XSS or injection issues.
  request_changes_workflow: false
  high_level_summary: true
  poem: false
chat:
  auto_reply: true
